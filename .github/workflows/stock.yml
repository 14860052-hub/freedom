name: Stock Bot

on:
  workflow_dispatch:  # 手動執行

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Show files (Debug)
        run: ls -R   # 👈 先印出所有檔案

      - name: Setup Python
        uses: actions/setup-python@v4

      - name: Install packages
        run: pip install requests beautifulsoup4

      - name: Run bot
        run: |
          # 嘗試根目錄
          if [ -f "歡迎使用_colab.py" ]; then
            python stock_bot.py
          
          # 嘗試 bot 資料夾
          elif [ -f "bot/歡迎使用_colab.py" ]; then
            python bot/歡迎使用_colab.py
          
          # 找不到直接報錯（但會顯示結構）
          else
            echo "❌ 找不到 歡迎使用_colab.py"
            exit 1
          fi
