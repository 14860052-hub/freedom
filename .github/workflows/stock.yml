name: Run Stock Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 可以手動觸發

jobs:
  run-stock-bot:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 取得 repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ 顯示目錄結構（Debug 可選）
      - name: List files
        run: ls -R

      # 3️⃣ 安裝 Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 4️⃣ 安裝需求套件（如果有 requirements.txt）
      - name: Install dependencies
        if: ${{ exists('requirements.txt') }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5️⃣ 執行 stock_bot.py
      - name: Run stock bot
        working-directory: ${{ github.workspace }}  # 確保在 repo 根目錄
        run: python stock_bot.py
