name: Stock Bot

on:
  workflow_dispatch:  # 只允許手動執行

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4

      - name: Install packages
        run: pip install requests beautifulsoup4

      - name: Run bot
        run: python stock_bot.py
